# Optional static fallback for GitHub Pages.
# Limitations vs Vercel: no API routes (résumé PDF download disabled), no SSR.
# Enable in repo Settings → Pages → Source: GitHub Actions.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Next.js static export cannot include App Router API routes.
      - name: Prepare static export
        run: rm -rf apps/personal/src/app/api

      - name: Build static site
        working-directory: apps/personal
        env:
          STATIC_EXPORT: "true"
          # Project Pages URL: https://<user>.github.io/<repo>/
          BASE_PATH: /ed-norris-portfolio
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/personal/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
