# Edd Norris portfolio (apps/personal) — deploy to 2bitDEV.com on Railway.
# Monorepo root: npm workspaces build/start delegate to @ed-norris/personal.
#
# Deploy via GitHub push only — see DEPLOY.md (do NOT use `railway up`).
#
# Railway (twobitENT project):
#   Service: edd-norris-portfolio (GitHub: twobitEDD/ed-norris-portfolio, branch main)
#   Domain:  2bitdev.com (user attaches in dashboard — see DEPLOY.md)
#   URL:     https://edd-norris-portfolio-production.up.railway.app

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "apps/personal/**",
  "packages/**",
  "package.json",
  "package-lock.json",
  "railway.toml",
  ".railwayignore",
]

[deploy]
startCommand = "npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 300
