# Edd Norris portfolio (apps/personal) — deploy to 2bitDEV.com on Railway.
# Monorepo root: npm workspaces build/start delegate to @ed-norris/personal.
#
# Deploy via GitHub push only — see DEPLOY.md (do NOT use `railway up`).
#
# Railway (twobitENT project):
#   Service: 2bitdev-portfolio (4abc3283-3867-4802-b9d4-7baebd1e78f8)
#   GitHub:  twobitEDD/ed-norris-portfolio → main
#   Domain:  2bitdev.com (attach in dashboard — see DEPLOY.md)
#   URL:     https://2bitdev-portfolio-production.up.railway.app
#
# FORBIDDEN: never CLI deploy to 2bitent-site (8334c011-9071-46ca-bb97-7929d618d176).

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "apps/personal/**",
  "packages/**",
  "package.json",
  "package-lock.json",
  "railway.toml",
  ".railwayignore",
]

[deploy]
startCommand = "npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 300
